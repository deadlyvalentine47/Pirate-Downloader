<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            width: 350px; 
            padding: 0; 
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .header {
            background-color: #1e293b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .header h3 { margin: 0; font-size: 16px; color: #38bdf8; }
        .content {
            padding: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .media-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .media-item {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .media-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .media-name {
            font-size: 13px;
            font-weight: 500;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }
        .media-type {
            font-size: 10px;
            background-color: #334155;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .media-url {
            font-size: 11px;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .download-btn {
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background-color 0.2s;
        }
        .download-btn:hover {
            background-color: #0284c7;
        }
        .clear-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background-color: #ef4444;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: #64748b;
            font-style: italic;
            font-size: 13px;
        }
        .footer {
            padding: 10px 12px;
            background-color: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #ping-btn {
            background: none;
            border: none;
            color: #38bdf8;
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }
        #status { font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <h3>🏴‍☠️ Pirate Sniffer</h3>
        <button id="clear-all-btn" class="clear-btn">Clear All</button>
    </div>
    
    <div class="content">
        <div class="section-title">
            <span>Detected Media</span>
            <span id="media-count">0</span>
        </div>
        <div id="media-list" class="media-list">
            <div class="empty-state">No media detected yet. Sail the web to find treasure!</div>
        </div>
    </div>

    <div class="footer">
        <div id="status">Ready</div>
        <button id="ping-btn">Test Host</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
